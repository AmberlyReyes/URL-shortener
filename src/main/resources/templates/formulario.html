<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Tus estilos aquí */
    </style>
</head>
<body class="bg-page d-flex align-items-center justify-content-center vh-100">
<div class="bg-box p-5 rounded shadow-sm w-100" style="max-width: 400px;">
    <h2 class="text-center mb-4 text-dark">Log in</h2>

    <!-- Mensaje de error -->
    <div id="error-message" class="alert alert-danger text-center mb-4 d-none">
        Usuario o contraseña incorrectos
    </div>

    <form id="loginForm" class="needs-validation" novalidate>
        <div class="mb-3">
            <label for="usuario" class="form-label">Usuario</label>
            <input type="text" name="usuario" id="usuario" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" name="password" id="password" class="form-control" required>
        </div>
        <div class="mb-3 form-check">
            <input type="checkbox" name="recordar" id="recordar" class="form-check-input">
            <label for="recordar" class="form-check-label">Recordarme</label>
        </div>
        <button type="submit" class="w-100 btn btn-dark rounded-lg py-2">Entrar</button>
    </form>

    <p class="text-center mt-4 text-muted">
        <a href="/registro" class="link-secondary text-decoration-none">Regístrate aquí</a>
    </p>
</div>

<script>
    // Función para notificar al Service Worker
    function onLoginSuccess(userId) {
      localStorage.setItem('userId', userId);
      if (navigator.serviceWorker && navigator.serviceWorker.controller) {
        navigator.serviceWorker.controller.postMessage({
          type: 'SET_USER',
          userId: userId
        });
      }
    }

    // Capturamos el evento submit para hacer login vía AJAX
    document.getElementById('loginForm').addEventListener('submit', function(event) {
      event.preventDefault();
      const usuario = document.getElementById('usuario').value;
      const password = document.getElementById('password').value;

      // Realizamos la petición al servidor (ajusta la URL y opciones según tu API)
      fetch('/autenticar', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ usuario, password })
      })
      .then(response => response.json())
      .then(data => {
        if (data.exito) {
          // Supongamos que data contiene el userId
          onLoginSuccess(data.userId);
          // Redirecciona al dashboard o a la página deseada
          window.location.href = '/dashboard.html';
        } else {
          // Mostrar mensaje de error
          document.getElementById('error-message').classList.remove('d-none');
        }
      })
      .catch(error => {
        console.error('Error:', error);
        document.getElementById('error-message').classList.remove('d-none');
      });
    });
</script>

<!-- Bootstrap JS (optional) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
